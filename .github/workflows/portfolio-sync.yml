name: '🔄 Portfolio Content Sync'

on:
  schedule:
    - cron: '0 2 * * *' # Runs daily at 02:00 UTC
  pull_request:
    branches:
      - 'main'
    paths:
      - '.github/workflows/portfolio-sync.yml'
  push:
    branches:
      - 'main'
    paths:
      - '.github/workflows/portfolio-sync.yml'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

concurrency:
  group: '${{ github.workflow }}'
  cancel-in-progress: true

defaults:
  run:
    shell: 'bash'

jobs:
  sync:
    name: 'Sync Content'
    runs-on: 'ubuntu-latest'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - name: 'Checkout Repository'
        uses: 'actions/checkout@v4'

      - name: 'Set up Python'
        uses: 'actions/setup-python@v5'
        with:
          python-version: '3.12'

      - name: 'Set up uv'
        uses: 'astral-sh/setup-uv@v3'
        with:
          enable-cache: true

      - name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Install Dependencies'
        run: |
          uv sync

      - name: 'Run Ingestion'
        env:
          GOOGLE_CLOUD_PROJECT: 'dazbo-portfolio'
          GOOGLE_CLOUD_REGION: 'europe-west1'
          GOOGLE_GENAI_USE_VERTEXAI: 'True'
          GOOGLE_CLOUD_LOCATION: 'global'
          MODEL: "${{ vars.GEMINI_MODEL || 'gemini-3.5-flash' }}"
        run: |
          uv run python -m app.tools.ingest \
            --github-user "derailed-dash" \
            --medium-user "derailed-dash" \
            --devto-user "deraileddash" \
            --project-id "dazbo-portfolio"
